<p-toast></p-toast>
<div
    class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">
        <div
            style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg,#0EA5E9 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">
                <div class="text-center mb-8">
                    <div class="flex justify-center">
                        <img src="assets/images/white_logo.gif" style="height: 120px;width: 184px; text-align: center;">

                    </div>
                    <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">Welcome to Traders
                        Gurukul Center!
                    </div>
                    <span class="text-muted-color font-medium">Sign in to continue</span>
                </div>

                <form [formGroup]="loginForm" (submit)="login()">
                    <label for="email1"
                        class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Email</label>
                    <input pInputText id="email1" type="text" placeholder="Email address" class="w-full md:w-120 mb-2"
                        formControlName="mobile" />


                    <label for="password1"
                        class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2 mt-4">Password</label>
                    <p-password id="password1" formControlName="password" placeholder="Password" [toggleMask]="true"
                        [fluid]="true" [feedback]="false" class="mb-2"></p-password>

                    <div class="flex items-center justify-between mt-5 mb-8 gap-8">
                        <div class="flex items-center">
                            <p-checkbox id="rememberme1" binary class="mr-2"></p-checkbox>
                            <label for="rememberme1">Remember me</label>
                        </div>
                        <span class="font-medium no-underline ml-2 text-right cursor-pointer text-primary">Forgot
                            password?</span>
                    </div>

                    <p-button type="submit" label="Sign In" styleClass="w-full"></p-button>
                    <div class="flex justify-center mt-3 ">
                        <p [routerLink]="'/auth/register'"
                            class=" no-underline ml-2 text-right cursor-pointer text-primary">Create
                            an Account</p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
