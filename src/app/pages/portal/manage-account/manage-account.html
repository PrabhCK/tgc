<!-- DEMAT ACCOUNT HEADER -->
<div class="text-center mb-4">
    <h5 class="text-xl font-semibold">DEMAT ACCOUNT DETAILS</h5>
    <h6 class="text-gray-600">Open Free Demat Account and get Benefits.</h6>
</div>

<!-- BROKER CARDS -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div *ngFor="let i of stocklist" class="flex justify-center">
        <div class="bg-white shadow-md rounded-lg p-4 flex flex-col items-center h-full w-full">
            <img class="mb-2 w-64 h-40 object-contain" [src]="i.image || 'assets/no-image.png'" [ngClass]="!i.brokerage?'mt-10':''" alt="Broker Image">
            <!-- <p *ngIf="i.brokerage" class="text-gray-800 font-semibold mb-2">{{ i.brokerage }} Rs Brokerage</p> -->
            <a *ngIf="i.link" target="_blank" [href]="i.link"
                class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition w-full text-center">
                Open An Account
            </a>
        </div>
    </div>
</div>

<!-- ACCOUNT FORM FOR PRO TRADER ADVANCE -->
<div *ngIf="userdetails?.packagename" >
    <p-card class="shadow-lg rounded-lg">
        <ng-template pTemplate="header">
            <div class="bg-info-600 text-white font-bold text-lg px-4 py-2 rounded-t-lg">
                Account Details
            </div>
        </ng-template>
        <ng-template pTemplate="content">
            <form [formGroup]="accountForm" (ngSubmit)="saveTradingAcc()" class="space-y-4">

                <!-- STOCK BROKER SELECTION -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block mb-1 font-semibold">Stock Broker</label>
                        <p-select [options]="stockBrokers" optionLabel="label" optionValue="value" [style]="{ width: '100%' }"
                            formControlName="stockbroker" (onChange)="isBrokerValue()" >
                        </p-select>
                    </div>
                </div>

                <!-- LOGIN, PASSWORD, PIN -->
                <div *ngIf="isBrokerValue()" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block mb-1 font-semibold">Login ID </label>
                        <input type="text" pInputText formControlName="loginid"
                            class="w-full border rounded px-3 py-2" />
                    </div>
                    <div
                        *ngIf="accountForm.get('autologin').value && accountForm.get('stockbroker').value != 'ANGELBROKING'">
                        <label class="block mb-1 font-semibold">Password</label>
                        <input type="text" pInputText formControlName="password"
                            class="w-full border rounded px-3 py-2" />
                    </div>
                    <div
                        *ngIf="accountForm.get('autologin').value && !['STOXKART','ALICEBLUE'].includes(accountForm.get('stockbroker').value)">
                        <label class="block mb-1 font-semibold">PIN</label>
                        <input type="text" pInputText formControlName="password2fa"
                            class="w-full border rounded px-3 py-2" />
                    </div>
                </div>

                <!-- API & TOTP KEYS -->
                <div *ngIf="isBrokerValue()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- <div *ngIf="accountForm.get('stockbroker').value">
                        <label class="block mb-1 font-semibold">API Key</label>
                        <input type="text" pInputText formControlName="apikey"
                            class="w-full border rounded px-3 py-2" />
                    </div> -->
                     <div *ngIf="accountForm.get('stockbroker').value">
                        <label class="block mb-1 font-semibold">App Secret Key</label>
                        <input type="text" pInputText formControlName="appkey"
                            class="w-full border rounded px-3 py-2" />
                    </div>
                     <div *ngIf="accountForm.get('stockbroker').value">
                        <label class="block mb-1 font-semibold">App Key</label>
                        <input type="text" pInputText formControlName="appid"
                            class="w-full border rounded px-3 py-2" />
                    </div>
                    <div *ngIf="accountForm.get('autologin').value">
                        <label class="block mb-1 font-semibold">TOTP Key</label>
                        <input type="text" pInputText formControlName="totpkey"
                            class="w-full border rounded px-3 py-2" />
                    </div>
                    <div
                        *ngIf="accountForm.get('stockbroker').value == 'STOXKART' && accountForm.get('autologin').value">
                        <label class="block mb-1 font-semibold">API Secret</label>
                        <input type="text" pInputText formControlName="apisecret"
                            class="w-full border rounded px-3 py-2" />
                    </div>
                </div>

                <!-- PERSONAL DETAILS -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 font-semibold">Name<span class="text-red-600">*</span></label>
                        <input type="text" pInputText formControlName="name" class="w-full border rounded px-3 py-2" />
                    </div>
                    <div>
                        <label class="block mb-1 font-semibold">Mobile</label>
                        <input type="text" pInputText formControlName="mobile"
                            class="w-full border rounded px-3 py-2" />
                    </div>
                    <div>
                        <label class="block mb-1 font-semibold">Pan</label>
                        <input type="text" pInputText formControlName="pan" class="w-full border rounded px-3 py-2" />
                    </div>
                    <div>
                        <label class="block mb-1 font-semibold">Email</label>
                        <input type="text" pInputText formControlName="email" class="w-full border rounded px-3 py-2" />
                    </div>
                </div>

                <!-- DATE RANGE -->
                <div *ngIf="accountdata?.id" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 font-semibold">Start Date</label>
                        <input type="date" pInputText formControlName="startdate"
                            class="w-full border rounded px-3 py-2" [disabled]="true" />
                    </div>
                    <div>
                        <label class="block mb-1 font-semibold">End Date</label>
                        <input type="date" pInputText formControlName="enddate" class="w-full border rounded px-3 py-2"
                            [disabled]="true" />
                    </div>
                </div>

                <!-- AUTO LOGIN -->
                <div class="flex items-center gap-2 mt-2">
                    <p-checkbox formControlName="autologin" label="Auto Login" binary="true" 
                        (onChange)="getAutoLoginValue($event)"></p-checkbox>
                </div>

                <!-- BUTTONS -->
                <div class="flex flex-wrap gap-3 mt-4">
                    <button type="button" pButton label="Go to Login" class="p-button-info" (click)="gotoLogin()"
                        *ngIf="!autologin"></button>
                    <button type="button" pButton label="Generate Access Token" class="p-button-warning"
                        (click)="validate()"></button>
                    <button type="submit" pButton label="Save" class="p-button-success"
                        [disabled]="!accountForm.get('name').value" *ngIf="validated"></button>
                    <button type="button" pButton label="Delete Account Info" class="p-button-danger"
                        (click)="deleteAcc()" *ngIf="accountdata?.id"></button>
                </div>

            </form>
        </ng-template>
    </p-card>
</div>
<p-confirmDialog></p-confirmDialog>

<p-toast />
