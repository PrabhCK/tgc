<div class="container mx-auto py-6 px-4">
  <div class="flex justify-center">
    <div class="w-full md:w-8/12">
      
      <p-card header="Profile Details" class="shadow-md border rounded-xl">

        <div class="space-y-4">

          <!-- Name -->
          <div>
            <p class="font-semibold">Name</p>
            <p class="text-gray-600">{{ userdata.name || '-' }}</p>
          </div>

          <!-- Subscription Message -->
          <div>
            <p class="font-semibold">Subscription Message</p>
            <p class="text-gray-600">{{ userdata.subscriptionmsg || '-' }}</p>
          </div>

          <!-- Phone -->
          <div>
            <p class="font-semibold">Phone</p>
            <p class="text-gray-600">{{ userdata.phone || 'N/A' }}</p>
          </div>

          <!-- Email Section -->
          <div class="mt-3" *ngIf="!userdata.email">
            <div class="flex gap-2">
              <input type="email" pInputText [(ngModel)]="email" placeholder="Enter Email" class="w-full" />
              <p-button label="Update" severity="success" (click)="changeEmail()"></p-button>
            </div>
          </div>

          <div class="mt-3" *ngIf="userdata.email">
            <p class="font-semibold">Email</p>
            <p class="text-gray-600">{{ userdata.email }}</p>
          </div>

          <!-- Account Details -->
          <h5 class="mt-6 border-b pb-2 font-semibold">Account Details</h5>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <p class="font-semibold">Last Login</p>
              <p class="text-gray-600">{{ userdata.lastlogintime | date }}</p>
            </div>
            <div>
              <p class="font-semibold">Subscription Expiry</p>
              <p class="text-gray-600">{{ userdata.enddate || 'N/A' }}</p>
            </div>
          </div>

          <!-- Change Password -->
          <h5 class="mt-6 border-b pb-2 font-semibold">Change Password</h5>

          <form [formGroup]="cPasswordForm" (ngSubmit)="changePassword()" class="space-y-3">

            <div>
              <div class="p-inputgroup">
                <input class="w-90 me-2" [type]="isTextFieldType ? 'text' : 'password'" pInputText formControlName="password" placeholder="Enter New Password" />
                <span class="p-inputgroup-addon cursor-pointer" (click)="togglePasswordFieldType()">
                  <i class="pi" [ngClass]="{ 'pi-eye': !isTextFieldType, 'pi-eye-slash': isTextFieldType }"></i>
                </span>
              </div>
            </div>

            <div>
              <div class="p-inputgroup">
                <input class="w-90 me-2" [type]="isTextFieldType1 ? 'text' : 'password'" pInputText formControlName="cpassword" placeholder="Confirm Password" />
                <span class="p-inputgroup-addon cursor-pointer" (click)="togglePasswordFieldType1()">
                  <i class="pi" [ngClass]="{ 'pi-eye': !isTextFieldType1, 'pi-eye-slash': isTextFieldType1 }"></i>
                </span>
              </div>
            </div>

            <div class="text-center">
              <p-button label="Update" type="submit"></p-button>
            </div>

          </form>

        </div>

      </p-card>

    </div>
  </div>
</div>
<p-toast />
