<div class="p-4">
  <p-card>
    <ng-template pTemplate="header">
      <h5 class="text-lg font-semibold p-5 pb-0">Trade Analysis</h5>
    </ng-template>

    <form class="space-y-4" #f="ngForm" (ngSubmit)="oianalysis()">
      <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
        <!-- Stock Name -->
        <div>
          <label class="block mb-1 font-medium">Stock Name</label>
          <p-select class="w-full" [options]="stocklist" [(ngModel)]="stockname" optionLabel="name" #stock="ngModel"
            [ngClass]="{ 'p-invalid': !stockname }" name="stock" id="stock" (onChange)="getDate()" optionValue="value"
            placeholder="Select Stock" required>
          </p-select>
          <small class="text-red-500" *ngIf="!stockname && (f.submitted || stock.touched)">Stock Name is
            required</small>
        </div>

        <!-- Date -->
        <div>
          <label class="block mb-1 font-medium">Date</label>
            <p-datepicker [(ngModel)]="selected_date" #selectedd="ngModel" inputId="selected_date" name="selected_date"
             dateFormat="yy-mm-dd" [showIcon]="true" styleClass="w-full rounded-lg" inputStyleClass="w-full"
              (onSelect)="getExpiryDates()">
          </p-datepicker>
          <!-- <input type="date" class="p-inputtext p-component w-full" name="selectedd" id="selectedd" #selectedd="ngModel"
            [(ngModel)]="selected_date" (change)="getExpiryDates()" [ngClass]="{ 'p-invalid': !selected_date }"
            required /> -->
          <small class="text-red-500" *ngIf="!selected_date && (f.submitted || selectedd.touched)">Date is
            required</small>
        </div>

        <!-- Expiry Date -->
        <div>
          <label class="block mb-1 font-medium">Expiry Date</label>
          <p-select [options]="expirydates" [(ngModel)]="expiry_selected_date" name="eselected_date" id="eselected_date"
            #eselected_date="ngModel" placeholder="Select Expiry" (onChange)="oianalysis()"
            [ngClass]="{ 'p-invalid': !expiry_selected_date }" required>
          </p-select>
          <small class="text-red-500" *ngIf="!expiry_selected_date && (f.submitted || eselected_date.touched)">Expiry
            Date is required</small>
        </div>

        <!-- Interval -->
        <div *ngIf="changedata">
          <label class="block mb-1 font-medium">Interval</label>
          <p-select [options]="intervalList" [(ngModel)]="timeframe" name="tFrame" id="tFrame" #tFrame="ngModel"
            placeholder="Select Interval" (onChange)="oianalysis()" [ngClass]="{ 'p-invalid': !timeframe }" required>
          </p-select>
          <small class="text-red-500" *ngIf="!timeframe && (f.submitted || tFrame.touched)">Interval is required</small>
        </div>

        <!-- Checkbox + Button -->
        <!-- Checkbox + Button -->
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <p-checkbox binary="true" name="changedata" [(ngModel)]="changedata" inputId="changedata"
              (onChange)="changeDataToggler()">
            </p-checkbox>
            <label for="changedata" class="ml-2">Show Chg. in OI</label>
          </div>
          <button pButton type="submit" label="Submit" class="p-button-success "></button>
        </div>

      </div>
    </form>

    <!-- Underlying Info -->
    <div class="mt-4 text-left">
      <p>
        Underlying: <b>{{ stockname.name }}</b> at
        <strong>{{ tdata.spot_ltp | number }}</strong>,
        Chg:
        <span [ngClass]="tdata.spot_change < 0 ? 'text-red-500' : 'text-green-500'">
          <strong>{{ tdata.spot_change | number }}</strong>
        </span>
        <span [ngClass]="tdata.spot_change_per < 0 ? 'text-red-500' : 'text-green-500'">
          <strong>({{ tdata.spot_change_per }}%)</strong>
        </span>
      </p>
    </div>
  </p-card>

  <!-- Charts -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
    <p-card>
      <ng-template pTemplate="header">
        <h6 class="text-lg text-center font-semibold p-5 !pb-0">OI Analysis</h6>
      </ng-template>
      <div echarts [options]="oibarChartOption" [merge]="oibarupdateOptions" class="h-80"></div>
    </p-card>

    <p-card>
      <ng-template pTemplate="header">
        <h6 class="text-lg text-center font-semibold p-5 !pb-0">PCR Analysis</h6>
      </ng-template>
      <div echarts [options]="chartOption" [merge]="updateOptions" class="h-80"></div>
    </p-card>
  </div>

  <div class="mt-4">
    <p-card>
      <ng-template pTemplate="header">
        <h6 class="text-lg text-center font-semibold p-5 !pb-0">Strike Analysis</h6>
      </ng-template>
      <div echarts [options]="baroption" [merge]="barupdateOptions" class="h-96"></div>
    </p-card>
  </div>


</div>
